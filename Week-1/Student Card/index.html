<!DOCTYPE html>
<html>
  <head>
    <title>Student Profile Card</title>

    <style>
      /* Body Styling */
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* ID Selector */
      #profile-card {
        background-color: white;
        width: 320px;
        padding: 20px;
        border-radius: 15px;
        text-align: center;

        /* Shadow */
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);

        transition: 0.3s;
      }

      /* Card Hover Effect */
      #profile-card:hover {
        transform: translateY(-8px);
      }

      /* Class Selectors */
      .student-image {
        width: 180px;
        height: 200px;
        border-radius: 5%;
        margin-bottom: 15px;
      }

      .student-name {
        color: #f26ec6;
        font-size: 26px;
      }

      .student-course {
        color: #666;
        font-size: 18px;
        margin-bottom: 20px;
      }

      .profile-btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;

        transition: 0.3s;
      }

      /* Button Hover Effect */
      .profile-btn:hover {
        background-color: #0056b3;
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <div id="profile-card">
      <!-- Student Image -->
      <img
        src="/Student Card/WhatsApp Image 2026-05-09 at 11.49.03.jpeg"
        alt="Student Photo"
        class="student-image"
      />

      <!-- Student Name -->
      <h2 class="student-name">Prija Sanjel</h2>

      <!-- Course -->
      <p class="student-course">Computer Science Student</p>

      <!-- Button -->
      <button class="profile-btn">View Profile</button>
    </div>
  </body>
</html>
